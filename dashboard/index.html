<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project1 Analytics Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* your CSS goes here */
  </style>
</head>
<body>

  <!-- all your dashboard HTML goes here -->
  <canvas id="museumVisitorsChart"></canvas>
  <canvas id="onboardingStatusChart"></canvas>
  <canvas id="enrollmentChart"></canvas>
  <canvas id="movementTrendChart"></canvas>

  <script>
    const museumVisitorsCtx = document.getElementById("museumVisitorsChart");
    const onboardingStatusCtx = document.getElementById("onboardingStatusChart");
    const enrollmentCtx = document.getElementById("enrollmentChart");
    const movementTrendCtx = document.getElementById("movementTrendChart");

    new Chart(museumVisitorsCtx, {
      type: "bar",
      data: {
        labels: ["NYC", "Chicago"],
        datasets: [{
          label: "Total Visitors",
          data: [95200, 73150],
          borderWidth: 1,
          backgroundColor: ["#7cc3f2", "#7cc3f2"]
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false }
        }
      }
    });

    new Chart(onboardingStatusCtx, {
      type: "doughnut",
      data: {
        labels: ["Completed", "Late", "Escalated"],
        datasets: [{
          data: [68, 22, 10],
          backgroundColor: ["#3b82f6", "#f59e0b", "#ef4444"],
          borderColor: "#ffffff",
          borderWidth: 2,
          hoverOffset: 6
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: "58%",
        layout: {
          padding: {
            top: 10,
            bottom: 10,
            left: 10,
            right: 10
          }
        },
        plugins: {
          legend: {
            position: "bottom",
            align: "center",
            fullSize: false,
            labels: {
              usePointStyle: true,
              pointStyle: "circle",
              boxWidth: 8,
              boxHeight: 8,
              padding: 12,
              font: {
                size: 11,
                family: "Arial, sans-serif",
                weight: "600"
              },
              color: "#374151"
            }
          }
        }
      }
    });

    new Chart(enrollmentCtx, {
      type: "bar",
      data: {
        labels: ["Manhattan", "Brooklyn", "Queens", "Bronx", "Staten Island"],
        datasets: [{
          label: "Enrollment Records",
          data: [6900, 6400, 6100, 5600, 5000],
          borderWidth: 1,
          backgroundColor: "#93c5fd"
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false }
        }
      }
    });

    new Chart(movementTrendCtx, {
      type: "line",
      data: {
        labels: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"],
        datasets: [{
          label: "Students Moved",
          data: [1800, 1950, 2100, 2250, 2400, 2550, 2480, 2380, 2210, 2140, 2050, 1990],
          fill: false,
          tension: 0.3,
          borderColor: "#60a5fa",
          backgroundColor: "#60a5fa"
        }]
      },
      options: {
        responsive: true
      }
    });
  </script>
</body>
</html>
